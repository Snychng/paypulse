name: Release Desktop Apps

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS universal
            os: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            artifact-name: "PayPulse-macOS"
            artifact-path: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          - label: Windows x64
            os: windows-latest
            args: ""
            rust-targets: "x86_64-pc-windows-msvc"
            artifact-name: "PayPulse-Windows"
            artifact-path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must look like v0.1.0 or v1.2.3-beta.1, got: ${TAG}"
            exit 1
          fi

          export RELEASE_VERSION="${TAG#v}"
          node <<'NODE'
          const fs = require("node:fs");

          const releaseVersion = process.env.RELEASE_VERSION;
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const tauriConfig = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          const cargoToml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          const cargoVersion = cargoToml.match(/^version\s*=\s*"([^"]+)"/m)?.[1];

          const versions = {
            "package.json": packageJson.version,
            "src-tauri/tauri.conf.json": tauriConfig.version,
            "src-tauri/Cargo.toml": cargoVersion,
          };

          const mismatches = Object.entries(versions)
            .filter(([, version]) => version !== releaseVersion)
            .map(([file, version]) => `${file}=${version ?? "<missing>"}`);

          if (mismatches.length > 0) {
            console.error(`Release tag v${releaseVersion} does not match project versions: ${mismatches.join(", ")}`);
            process.exit(1);
          }

          console.log(`Release version ${releaseVersion} verified.`);
          NODE

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PayPulse ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-${{ github.ref_name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: warn
