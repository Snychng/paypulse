<!DOCTYPE html>
<html lang="zh" data-theme="dark" data-lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PayPulse · Tray / Menubar</title>
<link rel="stylesheet" href="pixel.css" />
<style>
  body { width: 100vw; height: 100vh; position: relative; background: #0e1020; }
  /* faux work desktop */
  .scene { position: fixed; inset: 0; overflow: hidden;
    background: linear-gradient(160deg, #1b2347 0%, #2a2d4e 55%, #3a2750 100%); }
  .scene::before { content: ''; position: absolute; inset: 0;
    background-image: linear-gradient(0deg, #ffffff06 1px, transparent 1px), linear-gradient(90deg, #ffffff06 1px, transparent 1px);
    background-size: 22px 22px; }
  .coinstage { position: fixed; inset: 0; z-index: 30; pointer-events: none; }

  /* ===== macOS menubar (top) ===== */
  .menubar { position: fixed; top: 0; left: 0; right: 0; height: 26px; z-index: 40;
    background: #14152ce6; border-bottom: 2px solid #000; display: flex; align-items: center;
    padding: 0 10px; gap: 16px; backdrop-filter: blur(2px); }
  .menubar .mi { font-family: 'DotGothic16'; font-size: 12px; color: #d6d2f0; }
  .menubar .mi.brand { font-family: 'Pixelify Sans'; font-weight: 700; }
  .menubar .right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
  .menubar .sys { color: #a9a7c8; font-size: 11px; font-family: 'VT323'; }
  /* our live status item */
  .status-item { display: flex; align-items: center; gap: 6px; padding: 2px 6px; cursor: pointer;
    border: 2px solid transparent; }
  .status-item:hover { background: #ffffff14; border-color: #ffffff22; }
  .status-item .amt { font-family: 'VT323'; font-size: 16px; color: var(--money); letter-spacing: .5px; }
  .status-item .amt .up { color: var(--gain); }

  /* ===== Windows taskbar (bottom) ===== */
  .taskbar { position: fixed; left: 0; right: 0; bottom: 0; height: 40px; z-index: 40;
    background: #0c0e1ce6; border-top: 2px solid #000; display: flex; align-items: center; padding: 0 12px; }
  .taskbar .startbtn { width: 30px; height: 30px; display: grid; place-items: center; background: #29366f; border: 2px solid #000; }
  .tray-zone { margin-left: auto; display: flex; align-items: center; gap: 12px; padding-right: 8px; }
  .tray-zone .sys { color: #a9a7c8; font-family: 'VT323'; font-size: 15px; }
  .tray-icon { position: relative; width: 28px; height: 28px; display: grid; place-items: center; cursor: pointer;
    border: 2px solid transparent; }
  .tray-icon:hover { background: #ffffff14; border-color: #ffffff22; }
  .tray-icon .badge { position: absolute; top: -7px; right: -9px; background: var(--gain-2); color: var(--inset);
    font-family: 'Silkscreen'; font-size: 7px; padding: 1px 3px; border: 1px solid #000; }
  .tooltip { position: absolute; bottom: 36px; right: 0; background: var(--panel); border: var(--b) solid var(--ink);
    box-shadow: 3px 3px 0 var(--hard); padding: 6px 9px; white-space: nowrap; display: none; }
  .tray-icon:hover .tooltip { display: block; }
  .tooltip .amt { font-family: 'VT323'; font-size: 17px; color: var(--money); }
  .win-clock { color: #cfd0e8; font-family: 'VT323'; font-size: 14px; text-align: right; line-height: 1; }

  /* ===== popover ===== */
  .popover { position: fixed; width: 264px; z-index: 50; display: none;
    background: var(--panel); border: var(--b) solid var(--ink); box-shadow: 5px 5px 0 var(--hard);
    background-image: linear-gradient(45deg, var(--dither) 25%, transparent 25% 75%, var(--dither) 75%); background-size: var(--px) var(--px); }
  .popover.open { display: block; animation: popin .12s steps(3); }
  @keyframes popin { 0% { transform: translateY(-6px) scale(.96); opacity: .2; } 100% { transform: none; opacity: 1; } }
  /* little arrow */
  .popover .arrow { position: absolute; width: 12px; height: 12px; background: var(--panel); border: var(--b) solid var(--ink); transform: rotate(45deg); }
  .pop-top { padding: 12px 14px 8px; text-align: center; position: relative; border-bottom: 2px dashed var(--line); }
  .pop-top .money { font-size: 34px; }
  .pop-grid { display: grid; grid-template-columns: 1fr 1fr; }
  .pop-grid .cell { padding: 9px 12px; border-right: 2px dashed var(--line); border-bottom: 2px dashed var(--line); }
  .pop-grid .cell:nth-child(2n) { border-right: none; }
  .cell .k { font-family: 'Silkscreen'; font-size: 8px; letter-spacing: 1px; color: var(--ink-dim); }
  .cell .v { font-family: 'VT323'; font-size: 19px; color: var(--ink); }
  .cell .v.g { color: var(--gain); }
  .pop-ctrls { display: flex; gap: 7px; padding: 11px 12px; }
  .pop-ctrls .btn { flex: 1; justify-content: center; font-size: 11px; padding: 8px; }
  .pop-foot { display: flex; gap: 7px; padding: 0 12px 12px; }
  .pop-foot .lk { flex: 1; justify-content: center; font-size: 10px; padding: 7px; background: var(--panel-2); color: var(--ink-dim); }

  /* OS switcher */
  .osbar { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 20; text-align: center; }
  .osbar .hint { color: #cfcbe8cc; font-family: 'Silkscreen'; font-size: 9px; letter-spacing: 1px; margin-top: 14px; max-width: 320px; line-height: 1.7; }
  .arrow-up, .arrow-dn { color: var(--money); font-family: 'Pixelify Sans'; font-size: 22px; animation: bob 1.4s steps(8) infinite; }
</style>
</head>
<body class="crt">
  <div class="scene"></div>
  <div class="coinstage" id="stage"></div>

  <!-- macOS menubar -->
  <div class="menubar" id="macbar">
    <span class="mi brand" id="macbrand"></span>
    <span class="mi">File</span><span class="mi">Edit</span><span class="mi">View</span>
    <div class="right">
      <span class="sys">◧ ▼ ◑</span>
      <div class="status-item" id="macitem">
        <span id="maccoin"></span>
        <span class="amt">¥<span id="macAmt">238.71</span></span>
      </div>
      <span class="sys" id="macclock">星期五 22:14</span>
    </div>
  </div>

  <!-- Windows taskbar -->
  <div class="taskbar" id="winbar" style="display:none">
    <div class="startbtn" id="winstart"></div>
    <div class="tray-zone">
      <span class="sys">∧ ▦ ◳ ♪</span>
      <div class="tray-icon" id="winitem">
        <span id="wincoin"></span>
        <span class="badge" id="winbadge">¥238</span>
        <div class="tooltip"><div class="k label">PayPulse · today</div><div class="amt">¥<span id="winAmt">238.71</span></div></div>
      </div>
      <div class="win-clock">22:14<br>06/26</div>
    </div>
  </div>

  <!-- popover -->
  <div class="popover" id="pop">
    <span class="arrow" id="poparrow"></span>
    <div class="pop-top">
      <div class="label" data-i18n="today">EARNED TODAY</div>
      <div class="money" style="margin-top:4px"><span class="cur">¥</span><span id="popWhole">238</span><span class="dot">.</span><span class="dec" id="popDec">71</span></div>
      <div class="chip live" style="margin-top:8px;display:inline-block" id="popchip" data-i18n="working">WORKING</div>
    </div>
    <div class="pop-grid">
      <div class="cell"><div class="k" data-i18n="session">SESSION</div><div class="v font-term" id="popSess">02:13:40</div></div>
      <div class="cell"><div class="k" data-i18n="perSec">PER SECOND</div><div class="v g">+¥0.048</div></div>
      <div class="cell"><div class="k" data-i18n="week">THIS WEEK</div><div class="v">¥1,204</div></div>
      <div class="cell"><div class="k" data-i18n="month">THIS MONTH</div><div class="v">¥4,880</div></div>
    </div>
    <div class="pop-ctrls">
      <button class="btn pause" id="popToggle"><span id="popico"></span><span data-i18n="pause">PAUSE</span></button>
      <button class="btn stop hold" id="popStop"><span data-i18n="stop">CLOCK OUT</span></button>
    </div>
    <div class="pop-foot">
      <button class="lk btn" id="openDash"><span data-i18n="trend">7-DAY TREND</span></button>
      <button class="lk btn" id="openSet"><span data-i18n="settings">SETTINGS</span></button>
    </div>
  </div>

  <!-- center OS switcher -->
  <div class="osbar">
    <div class="seg nodrag" role="tablist">
      <button id="osMac" aria-pressed="true">macOS 菜单栏</button>
      <button id="osWin" aria-pressed="false">Windows 托盘</button>
    </div>
    <div class="arrow-up" id="arrUp">▲ 钱币飘入这里 ▲</div>
    <div class="hint" id="oshint">点击状态栏图标展开 popover · 硬币持续从桌面上浮汇入金额</div>
  </div>

<script src="sprites.js"></script>
<script>
  const K = window.PixelKit; let lang = 'zh', os = 'mac', working = true;
  document.getElementById('macbrand').innerHTML = K.SPRITE.coin(3) + ' <span style="color:var(--money)">PayPulse</span>';
  document.getElementById('maccoin').innerHTML = K.SPRITE.coin(3);
  document.getElementById('wincoin').innerHTML = K.SPRITE.coin(3);
  document.getElementById('winstart').innerHTML = K.icon('chart', 16, '') ;
  document.getElementById('popico').innerHTML = K.icon('pause', 12);
  K.applyI18n(lang);

  // earnings
  let earned = 238.71; const rate = 0.0479; let last = performance.now();
  const macAmt = document.getElementById('macAmt'), winAmt = document.getElementById('winAmt'),
        winBadge = document.getElementById('winbadge'), popWhole = document.getElementById('popWhole'), popDec = document.getElementById('popDec');
  function render() {
    const m = K.splitMoney(earned);
    macAmt.textContent = earned.toFixed(2); winAmt.textContent = earned.toFixed(2);
    winBadge.textContent = '¥' + m.whole; popWhole.textContent = m.whole; popDec.textContent = m.dec;
  }
  function frame(now) { if (working) earned += rate * (now - last) / 1000; last = now; render(); requestAnimationFrame(frame); }
  requestAnimationFrame(frame);

  // pulse the menubar amount each second
  setInterval(() => {
    if (!working) return;
    const el = os === 'mac' ? document.getElementById('macitem') : document.getElementById('winitem');
    el.animate([{ transform: 'scale(1)' }, { transform: 'scale(1.12)' }, { transform: 'scale(1)' }], { duration: 300, easing: 'steps(3)' });
  }, 1000);

  // CoinFlow -> active status item, biased from below/sides
  function targetEl() { return os === 'mac' ? document.getElementById('macitem') : document.getElementById('winitem'); }
  const flow = K.CoinFlow(document.getElementById('stage'), targetEl, { minGap: 300, maxGap: 760, scale: 3, edges: [2, 1, 3], billChance: 0.16 });
  flow.start();

  // OS switch
  function setOS(next) {
    os = next;
    document.getElementById('macbar').style.display = os === 'mac' ? 'flex' : 'none';
    document.getElementById('winbar').style.display = os === 'win' ? 'flex' : 'none';
    document.getElementById('osMac').setAttribute('aria-pressed', os === 'mac');
    document.getElementById('osWin').setAttribute('aria-pressed', os === 'win');
    document.getElementById('arrUp').style.display = os === 'mac' ? 'block' : 'none';
    document.getElementById('oshint').textContent = os === 'mac'
      ? '点击菜单栏金额展开 popover · 硬币持续从桌面上浮汇入（macOS 可直接显示实时金额文字）'
      : 'Windows 托盘无法常显实时文字 → 用 hover 提示 + 角标 + 图标重绘；硬币飘入托盘图标';
    closePop();
  }
  document.getElementById('osMac').onclick = () => setOS('mac');
  document.getElementById('osWin').onclick = () => setOS('win');

  // popover open/close anchored to active item
  const pop = document.getElementById('pop'), arrow = document.getElementById('poparrow');
  function openPop() {
    const item = targetEl().getBoundingClientRect();
    pop.classList.add('open');
    const w = pop.offsetWidth;
    if (os === 'mac') {
      let l = item.left + item.width / 2 - w / 2; l = Math.min(l, window.innerWidth - w - 8); l = Math.max(8, l);
      pop.style.left = l + 'px'; pop.style.top = (item.bottom + 8) + 'px';
      arrow.style.top = '-7px'; arrow.style.left = (item.left + item.width / 2 - l - 6) + 'px'; arrow.style.bottom = '';
    } else {
      let l = item.right - w; l = Math.max(8, l);
      pop.style.left = l + 'px'; pop.style.top = (item.top - pop.offsetHeight - 8) + 'px';
      arrow.style.bottom = '-7px'; arrow.style.top = ''; arrow.style.left = (item.left + item.width / 2 - l - 6) + 'px';
    }
  }
  function closePop() { pop.classList.remove('open'); }
  document.getElementById('macitem').onclick = (e) => { e.stopPropagation(); pop.classList.contains('open') ? closePop() : openPop(); };
  document.getElementById('winitem').onclick = (e) => { e.stopPropagation(); pop.classList.contains('open') ? closePop() : openPop(); };
  document.addEventListener('click', (e) => { if (!pop.contains(e.target)) closePop(); });

  // popover toggle working
  document.getElementById('popToggle').onclick = () => {
    working = !working;
    const chip = document.getElementById('popchip'), lbl = document.getElementById('popToggle').querySelector('[data-i18n]');
    document.getElementById('popico').innerHTML = K.icon(working ? 'pause' : 'play', 12);
    document.getElementById('popToggle').classList.toggle('go', !working);
    document.getElementById('popToggle').classList.toggle('pause', working);
    chip.classList.toggle('live', working); chip.dataset.i18n = working ? 'working' : 'paused';
    lbl.dataset.i18n = working ? 'pause' : 'resume';
    chip.textContent = K.t(chip.dataset.i18n, lang); lbl.textContent = K.t(lbl.dataset.i18n, lang);
    working ? flow.start() : flow.stop();
  };

  // 下班 = long-press to confirm (anti mis-tap)
  K.holdToConfirm(document.getElementById('popStop'), {
    ms: 800,
    onConfirm: () => {
      working = false; flow.stop();
      const chip = document.getElementById('popchip');
      chip.classList.remove('live'); chip.dataset.i18n = 'idle'; chip.textContent = K.t('idle', lang);
    },
  });

  // lang toggle on right-click anywhere (demo)
  window.addEventListener('contextmenu', (e) => { e.preventDefault(); lang = lang === 'zh' ? 'en' : 'zh'; K.applyI18n(lang); });
</script>
</body>
</html>
